env:
  TERM: rxvt-256color
window:
  dynamic_padding: true
  padding:
    x: 3
font:
  normal:
    family: JetBrainsMono NFM
    style: Regular
  bold:
    family: JetBrainsMono NFM
    style: Regular
  italic:
    family: JetBrainsMono NFM
    style: Italic
  bold_italic:
    family: JetBrainsMono NFM
    style: Regular Italic
  size: 14
  offset:
    x: 0
    'y': 4
cursor:
  style:
    shape: Beam
    blinking: 'On'
mouse_bindings:
  - mouse: Middle
    mode: ~Vi
    action: PasteSelection
key_bindings:
  - key: Space
    mods: Control
    mode: ~Search
    action: ToggleViMode
  - key: J
    mods: Control
    action: ScrollHalfPageDown
  - key: K
    mods: Control
    action: ScrollHalfPageUp
  - key: K
    mods: Shift
    mode: Vi|~Search
    action: ScrollHalfPageUp
  - key: J
    mods: Shift
    mode: Vi|~Search
    action: ScrollHalfPageDown
colors:
  # Default colors
  primary:
    background: '0x24292e'
    foreground: '0xd1d5da'

  # Normal colors
  normal:
    black: '0x24292e'
    red: '0xf14c4c'
    green: '0x23d18b'
    yellow: '0xe2e210'
    blue: '0x3b8eea'
    magenta: '0xbc3fbc'
    cyan: '0x29b7da'
    white: '0xd1d5da'

  # Bright colors
  bright:
    black: '0x666666'
    red: '0xf14c4c'
    green: '0x23d18b'
    yellow: '0xf5f543'
    blue: '0x3b8eea'
    magenta: '0xd670d6'
    cyan: '0x29b7da'
    white: '0xd1d5da'

  indexed_colors:
    - { index: 16, color: '0xd18616' }
    - { index: 17, color: '0xf14c4c' }
theme: github_dark
